name: Daily IT News Digest

on:
  schedule:
    # GitHubのschedule実行は保証がなく、高負荷時は数十分の遅延や
    # 完全なスキップが起きる（実測: 3回中2回不発、1回は50分遅れ）。
    # そのため同じジョブを朝に3回スケジュールし、最初に成功した回の
    # 結果が既にあれば後続はguardステップが数秒でスキップする。
    # 毎時0分は最混雑スロットのため避けている。
    - cron: '47 21 * * *' # 06:47 JST
    - cron: '29 22 * * *' # 07:29 JST（リトライ1）
    - cron: '13 23 * * *' # 08:13 JST（リトライ2）
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: daily-news-digest
  cancel-in-progress: false

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure git identity
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"

      # ランナーはUTCで動くため、朝のJSTはUTCではまだ前日。日付の解釈をAIに
      # 任せると「前日=今日」と誤認して既存記事を理由にスキップするため、
      # JSTの日付をここで確定させてプロンプトに埋め込む
      - name: Compute today's date in JST
        id: date
        run: echo "today=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_OUTPUT"

      - name: Skip if today's digest already exists
        id: guard
        run: |
          TODAY="${{ steps.date.outputs.today }}"
          if git ls-remote --exit-code --heads origin "news/${TODAY}" > /dev/null 2>&1 \
             || [ -f "src/content/notes/news-${TODAY}.mdx" ]; then
            echo "今日分（news/${TODAY}）は既に存在するためスキップします"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate today's news digest and open a PR
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            リポジトリ kimi8-lapi16/study-memo はすでにmasterブランチでcheckout済み。
            `docs/daily-news-digest.md` を読み、その仕様に**厳密に**従って、今日分の
            ITニュースダイジェスト記事を作成すること。

            **今日の日付（JST）は ${{ steps.date.outputs.today }} である。**
            実行環境のシステム時計はUTCなので `date` コマンドの出力とはズレるが、
            必ずこの日付を使うこと。作成するファイルは
            `src/content/notes/news-${{ steps.date.outputs.today }}.mdx`、
            ブランチは `news/${{ steps.date.outputs.today }}`。
            リポジトリ内にそれより過去の日付の `news-*.mdx` が存在しても、それは
            過去分の公開済み記事であり今日分とは無関係。既存記事を理由に今日分の
            作成をスキップしてはならない（重複チェックは「同じ出来事を再度取り上げ
            ない」ためのものであり、記事作成自体の要否判断ではない）。

            このリポジトリはmasterへの直接pushができない（PR必須のルールセットが
            設定されている）ため、以下の手順で進めること:

            1. `git checkout -b news/${{ steps.date.outputs.today }}` で専用ブランチを作る
            2. 記事ファイルを作成する
            3. `npm ci`（未インストールなら）→ `npm run build` でビルドが通ることを確認する
            4. 変更をコミットし、`git push -u origin news/${{ steps.date.outputs.today }}` でpushする
            5. `gh pr create --base master --head news/${{ steps.date.outputs.today }}
               --title "news: ITニュースダイジェスト ${{ steps.date.outputs.today }}"
               --reviewer kimi8-lapi16 --body "..."` でPRを作成する。
               本文にはその日採用したニュースのタイトルと出典URLを箇条書きで入れる

            価値のあるニュースが1件も見つからない場合は、ブランチもPRも作らずに終了してよい。
            `npm run build` が失敗する場合は原因を修正し、それでも解決しなければブランチを
            pushせず・PRも作らずに終了する（サイトを壊さないことより優先されるものはない）。

            最後に、作成したPRのURLと採用ニュース件数（記事を作らなかった場合はその旨と
            スキップ理由）を報告すること。
          claude_args: |
            --max-turns 60
            --model claude-sonnet-5
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
