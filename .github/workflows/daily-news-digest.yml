name: Daily IT News Digest

on:
  schedule:
    # GitHubのschedule実行は保証がなく、高負荷時は数十分の遅延や
    # 完全なスキップが起きる（実測: 3回中2回不発、1回は50分遅れ）。
    # そのため同じジョブを朝に3回スケジュールし、最初に成功した回の
    # 結果が既にあれば後続はguardステップが数秒でスキップする。
    # 毎時0分は最混雑スロットのため避けている。
    - cron: '47 21 * * *' # 06:47 JST
    - cron: '29 22 * * *' # 07:29 JST（リトライ1）
    - cron: '13 23 * * *' # 08:13 JST（リトライ2）
  workflow_dispatch:

permissions:
  contents: write
  actions: write # push後に deploy.yml を workflow_dispatch で起動するため
  id-token: write

concurrency:
  group: daily-news-digest
  cancel-in-progress: false

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure git identity
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"

      # ランナーはUTCで動くため、朝のJSTはUTCではまだ前日。日付の解釈をAIに
      # 任せると「前日=今日」と誤認して既存記事を理由にスキップするため、
      # JSTの日付をここで確定させてプロンプトに埋め込む
      - name: Compute today's date in JST
        id: date
        run: echo "today=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_OUTPUT"

      # 記事はmasterへ直接pushされるため、リトライ実行時はcheckout済みの
      # masterに今日分のファイルが既に存在するかだけを見ればよい
      - name: Skip if today's digest already exists
        id: guard
        run: |
          TODAY="${{ steps.date.outputs.today }}"
          if [ -f "src/content/notes/news-${TODAY}.mdx" ]; then
            echo "今日分（news-${TODAY}.mdx）は既にmasterに存在するためスキップします"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate today's news digest and push to master
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            リポジトリ kimi8-lapi16/study-memo はすでにmasterブランチでcheckout済み。
            `docs/daily-news-digest.md` を読み、その仕様に**厳密に**従って、今日分の
            ITニュースダイジェスト記事を作成すること。

            **今日の日付（JST）は ${{ steps.date.outputs.today }} である。**
            実行環境のシステム時計はUTCなので `date` コマンドの出力とはズレるが、
            必ずこの日付を使うこと。作成するファイルは
            `src/content/notes/news-${{ steps.date.outputs.today }}.mdx`。
            リポジトリ内にそれより過去の日付の `news-*.mdx` が存在しても、それは
            過去分の公開済み記事であり今日分とは無関係。既存記事を理由に今日分の
            作成をスキップしてはならない（重複チェックは「同じ出来事を再度取り上げ
            ない」ためのものであり、記事作成自体の要否判断ではない）。

            ブランチもPRも作らず、**masterへ直接pushする**。手順:

            1. masterブランチのまま記事ファイルを作成する
            2. `npm ci`（未インストールなら）→ `npm run build` でビルドが通ることを確認する
            3. 記事ファイルのみを `git add` してコミットし、`git push origin master` でpushする。
               non-fast-forwardで拒否されたら `git pull --rebase origin master` してから再pushする
            4. GitHub Pagesへのデプロイはこのワークフローの後続ステップが自動で起動するため、
               何もしなくてよい

            価値のあるニュースが1件も見つからない場合は、コミットもpushもせずに終了してよい。
            `npm run build` が失敗する場合は原因を修正し、それでも解決しなければコミット・push
            をせずに終了する（masterとサイトを壊さないことより優先されるものはない）。

            最後に、pushしたコミットのSHAと採用ニュース件数（記事を作らなかった場合はその旨と
            スキップ理由）を報告すること。
          claude_args: |
            --max-turns 60
            --model claude-sonnet-5
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"

      # GITHUB_TOKENによるpushはpushトリガーのワークフローを起動しない（Actionsの
      # 再帰実行防止仕様）ため、記事がmasterに入ったことを確認したうえで
      # deploy.yml を workflow_dispatch で明示的に起動する
      - name: Trigger Pages deploy if today's digest was pushed
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY="${{ steps.date.outputs.today }}"
          git fetch origin master
          if git cat-file -e "origin/master:src/content/notes/news-${TODAY}.mdx" 2>/dev/null; then
            echo "今日分の記事を確認。デプロイを起動します"
            gh workflow run deploy.yml --ref master -R "${{ github.repository }}"
          else
            echo "今日分の記事はmasterに存在しないため、デプロイは起動しません"
          fi
