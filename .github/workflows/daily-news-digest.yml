name: Daily IT News Digest

on:
  schedule:
    - cron: '0 22 * * *' # 07:00 JST
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-news-digest
  cancel-in-progress: false

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.NEWS_BOT_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure git identity
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"

      - name: Generate and publish today's news digest
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            リポジトリ kimi8-lapi16/study-memo はすでにmasterブランチでcheckout済み。
            `docs/daily-news-digest.md` を読み、その仕様に**厳密に**従って、今日分の
            ITニュースダイジェスト記事（`src/content/notes/news-YYYY-MM-DD.mdx`）を
            1本作成し、`npm run build` でビルド確認した上で、masterブランチへ直接
            git commit & push すること（PRは作らない）。日付はJST（UTC+9）基準で、
            今日の日付を使うこと。

            価値のあるニュースが見つからない場合は記事を作成せず、pushもせずに終了して
            よい。`npm run build` が失敗する場合は原因を修正し、それでも解決しなければ
            pushせずに終了する。

            最後に、作成した記事のタイトルと採用件数、pushしたコミットハッシュ
            （記事を作らなかった場合はその旨とスキップ理由）を報告すること。
          claude_args: |
            --max-turns 60
            --model claude-sonnet-5
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
